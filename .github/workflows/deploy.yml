name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Run tests before deploy
        run: |
          dotnet restore
          dotnet test --configuration Release --verbosity normal

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/global_activity_bot_v2
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Home Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read

    steps:
      - name: Tag backup image before deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BACKUP_TAG="backup-$(date +%Y%m%d-%H%M%S)"
            docker tag ghcr.io/${{ github.repository_owner }}/global_activity_bot_v2:latest \
              ghcr.io/${{ github.repository_owner }}/global_activity_bot_v2:${BACKUP_TAG} 2>/dev/null || true
            echo "Backup tagged as ${BACKUP_TAG}"

      - name: Pull latest image and restart bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/globalstatsbot
            docker compose pull bot
            docker compose up -d --no-deps bot
            echo "Deploy completed successfully"

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            if docker compose -f /opt/globalstatsbot/docker-compose.yml ps bot | grep -q "Up"; then
              echo "Bot is running"
            else
              echo "Bot failed to start - rolling back"
              cd /opt/globalstatsbot
              BACKUP_TAG=$(docker images ghcr.io/${{ github.repository_owner }}/global_activity_bot_v2 --format "{{.Tag}}" | grep "^backup-" | sort -r | head -1)
              if [ -n "${BACKUP_TAG}" ]; then
                docker tag ghcr.io/${{ github.repository_owner }}/global_activity_bot_v2:${BACKUP_TAG} \
                  ghcr.io/${{ github.repository_owner }}/global_activity_bot_v2:latest
                docker compose up -d --no-deps bot
                echo "Rolled back to ${BACKUP_TAG}"
              fi
              exit 1
            fi
